<section id="hero" class="hero-section">
  <div class="container">
    <div class="hero-content">
      <div class="hero-text">
        <p class="hero-greeting" data-reveal style="--reveal-delay: 0s">
          Hi, I'm
        </p>
        <h1 class="hero-name" data-reveal style="--reveal-delay: 0.08s">
          Haulul
        </h1>
        <p class="hero-tagline" data-reveal style="--reveal-delay: 0.16s">
          Software Engineer @ Telkom University | Google AI Professional
          Certificate | Building Web & Mobile Apps with Angular, Flutter & Cloud
        </p>
        <div class="hero-actions" data-reveal style="--reveal-delay: 0.24s">
          <a
            class="btn btn-primary"
            href="{{ .Site.Params.cvURL }}"
            target="_blank"
            >Download CV</a
          >
          <a
            class="btn btn-secondary"
            href="{{ .Site.Params.portfolioURL }}"
            target="_blank"
            rel="noopener"
            >View Portfolio</a
          >
        </div>
      </div>
      <div class="hero-photo" data-reveal style="--reveal-delay: 0.12s">
        <img src="/images/profile.gif" alt="Haulul Azkiya" />
      </div>
    </div>
  </div>
</section>

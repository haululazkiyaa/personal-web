<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
(function () {
  var nav          = document.getElementById('bottomNav');
  var searchBtn    = document.getElementById('navSearchBtn');
  var searchBar    = document.getElementById('navSearchBar');
  var searchInput  = document.getElementById('navSearchInput');
  var cancelBtn    = document.getElementById('navSearchCancel');
  var resultsPanel = document.getElementById('navSearchResults');
  var fuse         = null;
  var isOpen       = false;

  if (!searchBtn) return;

  function openSearch() {
    isOpen = true;
    nav.classList.add('searching');
    resultsPanel.style.display = 'none';
    searchInput.value = '';
    setTimeout(function () { searchInput.focus(); }, 120);
    if (!fuse) loadIndex();
  }

  function closeSearch() {
    if (!isOpen) return;
    isOpen = false;
    nav.classList.remove('searching');
    resultsPanel.style.display = 'none';
    searchInput.value = '';
    searchInput.blur();
  }

  function loadIndex() {
    fetch('/index.json')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        fuse = new Fuse(data, {
          keys: ['title', 'summary', 'category', 'tags'],
          threshold: 0.35,
          minMatchCharLength: 2
        });
      });
  }

  function renderResults(items) {
    if (!items.length) {
      resultsPanel.innerHTML = '<p class="search-empty">No results found</p>';
      resultsPanel.style.display = 'block';
      return;
    }
    resultsPanel.innerHTML = '';
    items.forEach(function (r) {
      var p = r.item;
      var el = document.createElement('a');
      el.className = 'search-result-item';
      el.href = p.url;
      el.innerHTML =
        '<div class="sri-thumb">' +
          (p.thumbnail
            ? '<img src="' + p.thumbnail + '" alt="" />'
            : '<div class="sri-thumb-default"><span>Tulisan Haulul</span></div>') +
        '</div>' +
        '<div class="sri-body">' +
          '<p class="sri-title">' + p.title + '</p>' +
          '<p class="sri-meta">' + (p.date || '') + (p.category ? ' · ' + p.category : '') + '</p>' +
          '<p class="sri-summary">' + (p.summary || '').substring(0, 100) + '…</p>' +
        '</div>';
      resultsPanel.appendChild(el);
    });
    resultsPanel.style.display = 'block';
  }

  searchBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    openSearch();
  });
  cancelBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    closeSearch();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeSearch();
  });

  searchInput.addEventListener('input', function () {
    var q = searchInput.value.trim();
    if (!q || !fuse) { resultsPanel.style.display = 'none'; return; }
    renderResults(fuse.search(q).slice(0, 6));
  });

  // Close when clicking outside search area
  document.addEventListener('click', function (e) {
    if (searchBar.style.display === 'none') return;
    if (!searchBar.contains(e.target) && !resultsPanel.contains(e.target)) {
      closeSearch();
    }
  });
})();
</script>

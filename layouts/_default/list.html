{{ define "title" }}{{ .Title }} — {{ .Site.Title }}{{ end }}
{{ define "main" }}
<section class="list-page">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ range .Pages }}
    <article class="list-item">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <p>{{ .Summary }}</p>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
